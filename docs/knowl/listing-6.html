<figure class="listing figure-like"><pre class="code-block tex2jax_ignore">            &lt;?xml version="1.0" encoding="UTF-8" ?&gt;
&lt;exercise dynamic="yes" xml:id="solve-equation"&gt;
  &lt;title&gt;Solve an Equation&lt;/title&gt;
  &lt;setup seed="1234"&gt;
    &lt;de-parameter name="m" random="discrete" nonzero="yes" min="-4" max="5" by="1"/&gt;
    &lt;de-parameter name="b" random="discrete" min="-10" max="10"/&gt;
    &lt;de-parameter name="negB"&gt;-{{b}}&lt;/de-parameter&gt;
    &lt;de-term name="theFunction" context="formula"&gt;{{m}}*x+{{b}}&lt;/de-term&gt;
    &lt;de-term name="theAnswer" context="formula"&gt;-{{b}}/{{m}}&lt;/de-term&gt;
  &lt;/setup&gt;
  &lt;statement&gt;
    &lt;p&gt;
      Solve the equation &lt;m&gt;&lt;var name="theFunction"/&gt;=0&lt;/m&gt;
      to get the value of &lt;m&gt;x&lt;/m&gt;.
    &lt;/p&gt;
    &lt;p&gt;&lt;m&gt;x = &lt;/m&gt; &lt;fillin width="5" correct="theAnswer" submit="solution"/&gt;&lt;/p&gt;
  &lt;/statement&gt;
  &lt;solution&gt;
    &lt;p&gt;
      We want to isolate the &lt;m&gt;x&lt;/m&gt; in the equation &lt;m&gt;&lt;var name="theFunction"/&gt;&lt;/m&gt;.
      Because addition of &lt;m&gt;&lt;var name="b"/&gt;&lt;/m&gt; is the last operation, we apply the inverse by adding &lt;m&gt;&lt;var name="negB"/&gt;&lt;/m&gt; to both sides.
      The new, but equivalent equation is now &lt;m&gt;&lt;var name="m"/&gt;x = &lt;var name="negB"/&gt;&lt;/m&gt;.
      Dividing both sides of the equation by &lt;m&gt;&lt;var name="m"/&gt;&lt;/m&gt;, we obtain the solution &lt;m&gt;x=&lt;var name="theAnswer"/&gt;&lt;/m&gt;.
    &lt;/p&gt;
  &lt;/solution&gt;
  &lt;evaluation&gt;
    &lt;evaluate submit="solution"&gt;
      &lt;test correct="yes"&gt;
        &lt;var name="theAnswer" /&gt;
        &lt;feedback&gt;Correct!&lt;/feedback&gt;
      &lt;/test&gt;
      &lt;test&gt;
        &lt;de-term context="formula"&gt;{{b}}/{{m}}&lt;/de-term&gt;
        &lt;feedback&gt;Error with signs while isolating &lt;m&gt;x&lt;/m&gt;&lt;/feedback&gt;
      &lt;/test&gt;
      &lt;feedback&gt;Incorrect. Try again.&lt;/feedback&gt;
    &lt;/evaluate&gt;
  &lt;/evaluation&gt;
&lt;/exercise&gt;
</pre>
